<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" fill="none">
  <defs>
    <linearGradient id="murmure" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="murmure-v" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- ==================== Smartphone ==================== -->
  <!-- Body : y=20..110, centre vertical = 65 -->
  <rect x="30" y="20" width="50" height="90" rx="6" stroke="url(#murmure-v)" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- Screen -->
  <rect x="36" y="30" width="38" height="60" rx="2" stroke="url(#murmure-v)" stroke-width="1" stroke-opacity="0.3" fill="url(#murmure-v)" fill-opacity="0.04"/>
  <!-- Home button -->
  <circle cx="55" cy="101" r="4" stroke="url(#murmure)" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Audio bars centrees dans l'ecran (ecran x=36..74, centre=55) -->
  <!-- Groupe de 5 barres : x = 46,50,54,58,62 (centre groupe = 55) -->
  <rect x="46" y="52" width="2" height="12" rx="1" fill="#06b6d4" fill-opacity="0.35"/>
  <rect x="50" y="48" width="2" height="20" rx="1" fill="#0ea5e9" fill-opacity="0.5"/>
  <rect x="54" y="43" width="2" height="30" rx="1" fill="#0ea5e9" fill-opacity="0.65"/>
  <rect x="58" y="48" width="2" height="20" rx="1" fill="#0ea5e9" fill-opacity="0.5"/>
  <rect x="62" y="52" width="2" height="12" rx="1" fill="#818cf8" fill-opacity="0.35"/>

  <!-- ==================== Connection line (animated) ==================== -->
  <line x1="90" y1="65" x2="190" y2="65" stroke="url(#murmure)" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Signal dots (pulsing) -->
  <circle cx="118" cy="65" r="1.5" fill="#06b6d4" fill-opacity="0.5">
    <animate attributeName="fill-opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="65" r="2" fill="#0ea5e9" fill-opacity="0.6">
    <animate attributeName="fill-opacity" values="0.3;0.8;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="162" cy="65" r="1.5" fill="#818cf8" fill-opacity="0.5">
    <animate attributeName="fill-opacity" values="0.2;0.7;0.2" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- ==================== Computer monitor ==================== -->
  <!-- Monitor body : centre vertical = 65 → y=41..89 (hauteur 48) -->
  <rect x="195" y="41" width="65" height="48" rx="4" stroke="url(#murmure-v)" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- Screen -->
  <rect x="201" y="47" width="53" height="36" rx="2" stroke="url(#murmure-v)" stroke-width="1" stroke-opacity="0.3" fill="url(#murmure-v)" fill-opacity="0.04"/>
  <!-- Stand neck -->
  <line x1="227" y1="89" x2="227" y2="100" stroke="url(#murmure)" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Stand base -->
  <line x1="214" y1="100" x2="241" y2="100" stroke="url(#murmure)" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Cursor on screen -->
  <path d="M222 55 L222 67 L226 64 L230 70 L232 69 L228 63 L232 61 Z" fill="#0ea5e9" fill-opacity="0.35"/>

  <!-- Text lines on screen -->
  <rect x="210" y="72" width="18" height="2" rx="1" fill="#818cf8" fill-opacity="0.15"/>
  <rect x="210" y="76" width="12" height="2" rx="1" fill="#818cf8" fill-opacity="0.1"/>
</svg>
