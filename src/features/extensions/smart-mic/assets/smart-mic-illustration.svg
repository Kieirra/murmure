<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" fill="none">
  <defs>
    <linearGradient id="murmure" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="murmure-v" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Smartphone -->
  <rect x="30" y="20" width="50" height="90" rx="6" stroke="url(#murmure-v)" stroke-width="1.5" stroke-opacity="0.75"/>
  <rect x="36" y="30" width="38" height="60" rx="2" stroke="url(#murmure-v)" stroke-width="1" stroke-opacity="0.45" fill="url(#murmure-v)" fill-opacity="0.06"/>
  <circle cx="55" cy="101" r="4" stroke="url(#murmure)" stroke-width="1" stroke-opacity="0.55"/>

  <!-- Audio bars -->
  <rect x="46" y="52" width="2" height="12" rx="1" fill="#22d3ee" fill-opacity="0.55"/>
  <rect x="50" y="48" width="2" height="20" rx="1" fill="#38bdf8" fill-opacity="0.7"/>
  <rect x="54" y="43" width="2" height="30" rx="1" fill="#38bdf8" fill-opacity="0.85"/>
  <rect x="58" y="48" width="2" height="20" rx="1" fill="#38bdf8" fill-opacity="0.7"/>
  <rect x="62" y="52" width="2" height="12" rx="1" fill="#a78bfa" fill-opacity="0.55"/>

  <!-- Connection line (animated) -->
  <line x1="90" y1="65" x2="190" y2="65" stroke="url(#murmure)" stroke-width="1.5" stroke-opacity="0.65" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Signal dots (pulsing) -->
  <circle cx="118" cy="65" r="1.5" fill="#22d3ee" fill-opacity="0.7">
    <animate attributeName="fill-opacity" values="0.35;0.85;0.35" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="65" r="2" fill="#38bdf8" fill-opacity="0.8">
    <animate attributeName="fill-opacity" values="0.4;0.9;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="162" cy="65" r="1.5" fill="#a78bfa" fill-opacity="0.7">
    <animate attributeName="fill-opacity" values="0.35;0.85;0.35" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Computer monitor -->
  <rect x="195" y="41" width="65" height="48" rx="4" stroke="url(#murmure-v)" stroke-width="1.5" stroke-opacity="0.75"/>
  <rect x="201" y="47" width="53" height="36" rx="2" stroke="url(#murmure-v)" stroke-width="1" stroke-opacity="0.45" fill="url(#murmure-v)" fill-opacity="0.06"/>
  <!-- Stand -->
  <line x1="227" y1="89" x2="227" y2="100" stroke="url(#murmure)" stroke-width="1.5" stroke-opacity="0.65"/>
  <line x1="214" y1="100" x2="241" y2="100" stroke="url(#murmure)" stroke-width="1.5" stroke-opacity="0.65"/>

  <!-- Cursor -->
  <path d="M222 55 L222 67 L226 64 L230 70 L232 69 L228 63 L232 61 Z" fill="#38bdf8" fill-opacity="0.5"/>

  <!-- Text lines -->
  <rect x="210" y="72" width="18" height="2" rx="1" fill="#a78bfa" fill-opacity="0.25"/>
  <rect x="210" y="76" width="12" height="2" rx="1" fill="#a78bfa" fill-opacity="0.18"/>
</svg>
