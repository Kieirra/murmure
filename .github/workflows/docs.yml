name: Documentation

on:
    push:
        branches: [main]
        paths:
            - 'docs/**'
            - 'overrides/**'
            - 'mkdocs.yml'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: 3.x
            - run: 'pip install --only-binary :all: mkdocs-material==9.7.6 mkdocs-static-i18n==1.3.1'
            - run: mkdocs gh-deploy --force
