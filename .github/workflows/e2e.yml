name: E2E
on:
    pull_request:

jobs:
    e2e-linux:
        name: E2E Linux (golden path)
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7

            - uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
              with:
                  workspaces: './src-tauri -> target'

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Install Linux deps + WebDriver
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libasound2-dev \
                    libxdo-dev \
                    unzip \
                    build-essential \
                    curl \
                    wget \
                    file \
                    libssl-dev \
                    webkit2gtk-driver \
                    xvfb

            - name: Install tauri-driver
              run: cargo install tauri-driver --locked

            - name: Download & extract ONNX model (Linux)
              shell: bash
              run: |
                  set -euo pipefail
                  url="https://github.com/Kieirra/murmure-model/releases/download/1.0.0/parakeet-tdt-0.6b-v3-int8.zip"
                  tmp="/tmp/model.zip"
                  curl -L -o "$tmp" "$url"
                  unzip -o "$tmp" -d resources
                  ls -al resources

            - name: Install frontend deps
              run: pnpm install

            - name: Build SmartMic frontend
              run: pnpm build:smartmic

            - name: Build frontend
              run: pnpm build

            - name: Run E2E
              run: pnpm test:e2e

            - name: Upload binary logs on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-binary-log
                  path: tests-e2e/logs/
