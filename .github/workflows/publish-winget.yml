name: Publish to WinGet
on:
    release:
        types: [released]
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag to publish (e.g. 1.9.0)'
                required: true

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Publish to WinGet
              uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e
              with:
                  identifier: Kieirra.Murmure
                  installers-regex: '\.(msi|exe)$'
                  release-tag: ${{ inputs.tag || github.event.release.tag_name }}
                  token: ${{ secrets.WINGET_TOKEN }}
