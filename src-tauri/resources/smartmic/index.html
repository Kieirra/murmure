<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, height=device-height">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="/manifest.json">
    <title>Murmure SmartMic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Status bar */
        .status-bar {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
            border-bottom: 1px solid #222;
        }

        .status-bar .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            margin-right: 8px;
            transition: background 150ms;
        }

        .status-bar .status-dot.connected {
            background: #22c55e;
        }

        .status-bar .left {
            display: flex;
            align-items: center;
        }

        /* Transcription zone */
        .transcription-zone {
            flex: 1;
            padding: 8px 12px;
            font-size: 14px;
            color: #ccc;
            border-bottom: 1px solid #222;
            overflow-y: auto;
            position: relative;
            cursor: pointer;
        }

        .transcription-zone .placeholder {
            color: #555;
            font-style: italic;
        }

        .transcription-zone .transcription-item {
            padding: 4px 0;
            border-bottom: 1px solid #1a1a1a;
            line-height: 1.3;
        }

        .transcription-zone .transcription-item:last-child {
            border-bottom: none;
        }

        .transcription-zone .transcription-item.previous {
            color: #666;
            font-size: 12px;
        }

        .transcription-zone .copied-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #22c55e;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 150ms;
            pointer-events: none;
        }

        .transcription-zone .copied-toast.visible {
            opacity: 1;
        }

        /* Audio visualizer — Murmure colors */
        .audio-visualizer {
            height: 64px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 2px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .audio-visualizer .bar {
            flex: 1;
            border-radius: 2px;
            height: 4px;
            transition: height 80ms;
            background: hsl(239, 84%, 67%);
        }

        .audio-visualizer.active .bar {
            background: hsl(199, 89%, 48%);
        }

        .audio-visualizer.active .bar.edge {
            background: hsl(180, 100%, 50%);
        }

        .audio-visualizer.active .bar.center {
            background: hsl(239, 84%, 67%);
        }

        /* Trackpad */
        .trackpad {
            flex: 1;
            max-height: 25vh;
            background: #111;
            border: 1px solid #333;
            margin: 8px;
            border-radius: 8px;
            touch-action: none;
            position: relative;
            min-height: 80px;
        }

        .trackpad::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: 1px solid #333;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
        }

        /* Click buttons */
        .click-buttons {
            display: flex;
            gap: 8px;
            padding: 0 8px;
            height: 56px;
            flex-shrink: 0;
        }

        .click-buttons button {
            border: 1px solid #333;
            background: #181818;
            color: #ccc;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 150ms;
            touch-action: manipulation;
        }

        .click-buttons button:active {
            background: #2a2a2a;
        }

        .click-buttons .btn-left {
            flex: 6;
        }

        .click-buttons .btn-right {
            flex: 4;
        }

        /* REC area */
        .rec-area {
            display: flex;
            align-items: center;
            padding: 8px;
            gap: 0;
            height: 72px;
            flex-shrink: 0;
        }

        .rec-area .mode-arrow {
            width: 44px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #181818;
            border: 1px solid #333;
            border-radius: 8px;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 150ms;
            touch-action: manipulation;
        }

        .rec-area .mode-arrow:active {
            background: #2a2a2a;
        }

        .rec-area .rec-btn {
            flex: 1;
            height: 56px;
            margin: 0 6px;
            background: #1a1a2e;
            border: 2px solid #444;
            border-radius: 12px;
            color: #e5e5e5;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 150ms;
            touch-action: none;
            position: relative;
        }

        .rec-area .rec-btn.recording {
            background: #7f1d1d;
            border-color: #dc2626;
            color: #fca5a5;
        }

        .rec-area .rec-btn .mode-label {
            font-size: 11px;
            color: #888;
            position: absolute;
            bottom: 4px;
            right: 10px;
        }

        .rec-area .rec-btn.recording .mode-label {
            color: #fca5a5;
        }

        /* Mic level indicator */
        .mic-level {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #dc2626;
            border-radius: 0 0 10px 10px;
            transition: width 100ms;
            width: 0;
        }

        /* Error overlay */
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 150ms;
        }

        .error-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .error-overlay .error-content {
            background: #1a1a1a;
            border: 1px solid #dc2626;
            border-radius: 12px;
            padding: 20px;
            max-width: 320px;
            text-align: center;
        }

        .error-overlay .error-content h3 {
            color: #fca5a5;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .error-overlay .error-content p {
            color: #999;
            font-size: 14px;
            line-height: 1.5;
        }

        .error-overlay .error-content button {
            margin-top: 16px;
            padding: 8px 24px;
            background: #333;
            border: none;
            border-radius: 8px;
            color: #e5e5e5;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Status bar -->
    <div class="status-bar">
        <div class="left">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connexion...</span>
        </div>
        <span id="pcName"></span>
    </div>

    <!-- Transcription zone (2 dernières) -->
    <div class="transcription-zone" id="transcriptionZone">
        <span class="placeholder" id="transcriptionPlaceholder">La transcription apparaitra ici</span>
        <div id="transcriptionList" style="display:none"></div>
        <div class="copied-toast" id="copiedToast">Copie</div>
    </div>

    <!-- Audio visualizer -->
    <div class="audio-visualizer" id="audioVisualizer"></div>

    <!-- Trackpad -->
    <div class="trackpad" id="trackpad"></div>

    <!-- Click buttons -->
    <div class="click-buttons">
        <button class="btn-left" id="btnLeft">CLIC G</button>
        <button class="btn-right" id="btnRight">CLIC D</button>
    </div>

    <!-- REC area -->
    <div class="rec-area">
        <div class="mode-arrow" id="modeLeft">&#9664;</div>
        <div class="rec-btn" id="recBtn">
            &#9679; REC
            <span class="mode-label" id="modeLabel">Mode: STT</span>
            <div class="mic-level" id="micLevel"></div>
        </div>
        <div class="mode-arrow" id="modeRight">&#9654;</div>
    </div>

    <!-- Error overlay -->
    <div class="error-overlay" id="errorOverlay">
        <div class="error-content">
            <h3 id="errorTitle">Erreur</h3>
            <p id="errorMessage"></p>
            <button id="errorDismiss">OK</button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // -- State --
        var ws = null;
        var currentMode = 'stt';
        var modes = [{ id: 'stt', name: 'STT' }];
        var modeIndex = 0;
        var isRecording = false;
        var audioContext = null;
        var mediaStream = null;
        var workletNode = null;
        var transcriptions = [];
        var VISUALIZER_BARS = 24;
        var reconnectAttempts = 0;
        var maxReconnectAttempts = 10;
        var reconnectTimer = null;
        var recBtnTouchStarted = false;

        // -- DOM --
        var statusDot = document.getElementById('statusDot');
        var statusText = document.getElementById('statusText');
        var pcName = document.getElementById('pcName');
        var transcriptionZone = document.getElementById('transcriptionZone');
        var transcriptionPlaceholder = document.getElementById('transcriptionPlaceholder');
        var transcriptionList = document.getElementById('transcriptionList');
        var copiedToast = document.getElementById('copiedToast');
        var audioVisualizer = document.getElementById('audioVisualizer');
        var trackpad = document.getElementById('trackpad');
        var btnLeft = document.getElementById('btnLeft');
        var btnRight = document.getElementById('btnRight');
        var recBtn = document.getElementById('recBtn');
        var modeLabel = document.getElementById('modeLabel');
        var modeLeft = document.getElementById('modeLeft');
        var modeRight = document.getElementById('modeRight');
        var micLevel = document.getElementById('micLevel');
        var errorOverlay = document.getElementById('errorOverlay');
        var errorTitle = document.getElementById('errorTitle');
        var errorMessage = document.getElementById('errorMessage');
        var errorDismiss = document.getElementById('errorDismiss');

        // -- Init visualizer bars (Murmure color zones) --
        for (var i = 0; i < VISUALIZER_BARS; i++) {
            var bar = document.createElement('div');
            var distFromCenter = Math.abs(i - (VISUALIZER_BARS - 1) / 2);
            var maxDist = (VISUALIZER_BARS - 1) / 2;
            if (distFromCenter > maxDist * 0.6) {
                bar.className = 'bar edge';
            } else if (distFromCenter < maxDist * 0.2) {
                bar.className = 'bar center';
            } else {
                bar.className = 'bar';
            }
            audioVisualizer.appendChild(bar);
        }

        // -- Token --
        function getToken() {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');
            if (token) {
                localStorage.setItem('smartmic_token', token);
                return token;
            }
            return localStorage.getItem('smartmic_token');
        }

        var token = getToken();

        // -- Error display --
        function showError(title, message) {
            errorTitle.textContent = title;
            errorMessage.textContent = message;
            errorOverlay.classList.add('visible');
        }

        errorDismiss.addEventListener('click', function() {
            errorOverlay.classList.remove('visible');
        });

        // -- Audio pipeline (initialized once on first connection) --
        var audioReady = false;

        async function initAudioPipeline() {
            if (audioReady) return;

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError('Erreur', 'Votre navigateur ne supporte pas l\'enregistrement audio. Utilisez Chrome ou Firefox recent.');
                return;
            }

            if (typeof AudioWorkletNode === 'undefined') {
                showError('Erreur', 'Votre navigateur ne supporte pas l\'enregistrement audio. Utilisez Chrome ou Firefox recent.');
                return;
            }

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                audioContext = new AudioContext({ sampleRate: 16000 });

                var processorCode = [
                    'class PcmProcessor extends AudioWorkletProcessor {',
                    '    process(inputs) {',
                    '        var input = inputs[0][0];',
                    '        if (input) {',
                    '            var pcm16 = new Int16Array(input.length);',
                    '            for (var i = 0; i < input.length; i++) {',
                    '                pcm16[i] = Math.max(-32768, Math.min(32767, Math.round(input[i] * 32767)));',
                    '            }',
                    '            this.port.postMessage(pcm16.buffer, [pcm16.buffer]);',
                    '        }',
                    '        return true;',
                    '    }',
                    '}',
                    'registerProcessor("pcm-processor", PcmProcessor);'
                ].join('\n');

                var blob = new Blob([processorCode], { type: 'application/javascript' });
                var url = URL.createObjectURL(blob);
                await audioContext.audioWorklet.addModule(url);
                URL.revokeObjectURL(url);

                var source = audioContext.createMediaStreamSource(mediaStream);
                workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');

                workletNode.port.onmessage = function(event) {
                    if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
                    var pcmBuffer = event.data;
                    var header = new Uint8Array([0x01]);
                    var payload = new Uint8Array(pcmBuffer);
                    var message = new Uint8Array(header.length + payload.length);
                    message.set(header, 0);
                    message.set(payload, header.length);
                    ws.send(message.buffer);
                };

                source.connect(workletNode);
                workletNode.connect(audioContext.destination);
                audioReady = true;
            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    showError('Acces refuse', 'Acces au micro refuse. Veuillez autoriser l\'acces dans les parametres de votre navigateur.');
                } else {
                    showError('Erreur', 'Impossible d\'acceder au micro: ' + err.message);
                }
            }
        }

        // -- WebSocket --
        function connectWebSocket() {
            if (!token) {
                showError('Erreur', 'Token invalide. Scannez a nouveau le QR code.');
                return;
            }

            var protocol = 'wss:';
            var wsUrl = protocol + '//' + location.host + '/ws?token=' + encodeURIComponent(token);

            try {
                ws = new WebSocket(wsUrl);
            } catch (e) {
                showError('Erreur de connexion', 'Impossible de se connecter au serveur.');
                return;
            }

            ws.binaryType = 'arraybuffer';

            ws.onopen = async function() {
                statusDot.classList.add('connected');
                statusText.textContent = 'Connecte';
                pcName.textContent = location.hostname;
                reconnectAttempts = 0;

                // Initialize audio pipeline once (getUserMedia + AudioWorklet)
                await initAudioPipeline();

                // Send pair message
                ws.send(JSON.stringify({ type: 'pair', token: token }));
            };

            ws.onmessage = function(event) {
                if (typeof event.data === 'string') {
                    try {
                        var msg = JSON.parse(event.data);
                        handleServerMessage(msg);
                    } catch (e) {
                        // Ignore parse errors
                    }
                }
            };

            ws.onclose = function() {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Connexion perdue. Reconnexion...';
                stopRecording();
                cleanupAudio();
                attemptReconnect();
            };

            ws.onerror = function() {
                // onclose will fire after this
            };
        }

        function attemptReconnect() {
            if (reconnectTimer !== null) return;
            if (reconnectAttempts >= maxReconnectAttempts) {
                statusText.textContent = 'Impossible de se reconnecter. Verifiez votre connexion.';
                return;
            }
            reconnectAttempts++;
            reconnectTimer = setTimeout(function() {
                reconnectTimer = null;
                connectWebSocket();
            }, 3000);
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'transcription':
                    var text = msg.text || '';
                    transcriptions.unshift(text);
                    if (transcriptions.length > 3) transcriptions.length = 3;
                    renderTranscriptions();
                    break;
                case 'status':
                    if (typeof msg.recording === 'boolean') {
                        if (!msg.recording && isRecording) {
                            stopRecording();
                        }
                    }
                    break;
                case 'mic_level':
                    if (typeof msg.level === 'number') {
                        micLevel.style.width = Math.round(msg.level * 100) + '%';
                        updateVisualizer(msg.level);
                    }
                    break;
                case 'modes':
                    if (Array.isArray(msg.modes)) {
                        modes = [{ id: 'stt', name: 'STT' }];
                        for (var m = 0; m < msg.modes.length; m++) {
                            modes.push({ id: 'llm_' + m, name: msg.modes[m] });
                        }
                        modeIndex = 0;
                        currentMode = modes[0].id;
                        updateModeLabel();
                    }
                    break;
                case 'error':
                    showError('Erreur', msg.message || 'Une erreur est survenue.');
                    break;
            }
        }

        function renderTranscriptions() {
            transcriptionPlaceholder.style.display = 'none';
            transcriptionList.style.display = 'block';
            transcriptionList.innerHTML = '';
            for (var i = 0; i < transcriptions.length; i++) {
                var item = document.createElement('div');
                item.className = 'transcription-item' + (i > 0 ? ' previous' : '');
                item.textContent = transcriptions[i];
                transcriptionList.appendChild(item);
            }
        }

        function updateVisualizer(level) {
            var bars = audioVisualizer.children;
            if (isRecording) {
                audioVisualizer.classList.add('active');
                for (var i = 0; i < bars.length; i++) {
                    // Center-weighted shape (higher bars in center, taper to edges)
                    var bias = Math.abs((i / (VISUALIZER_BARS - 1)) * 2 - 1);
                    var shape = 1 - bias * 0.6;
                    var randomFactor = 0.4 + Math.random() * 0.6;
                    var h = Math.max(4, Math.round(level * 56 * shape * randomFactor));
                    bars[i].style.height = h + 'px';
                }
            } else {
                audioVisualizer.classList.remove('active');
                for (var i = 0; i < bars.length; i++) {
                    bars[i].style.height = '4px';
                }
            }
        }

        // -- Transcription zone tap to copy (copies most recent) --
        transcriptionZone.addEventListener('click', function() {
            if (transcriptions.length === 0) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(transcriptions[0]).then(function() {
                    copiedToast.classList.add('visible');
                    setTimeout(function() {
                        copiedToast.classList.remove('visible');
                    }, 2000);
                });
            }
        });

        // -- Trackpad --
        var trackpadLastTouch = null;

        trackpad.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                trackpadLastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                // For scroll, track the midpoint
                var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                trackpadLastTouch = { x: 0, y: midY, scroll: true };
            }
        }, { passive: false });

        trackpad.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (e.touches.length === 1 && trackpadLastTouch && !trackpadLastTouch.scroll) {
                var dx = (e.touches[0].clientX - trackpadLastTouch.x) * 1.5;
                var dy = (e.touches[0].clientY - trackpadLastTouch.y) * 1.5;
                trackpadLastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                sendJson({ type: 'mouse_move', dx: dx, dy: dy });
            } else if (e.touches.length === 2 && trackpadLastTouch) {
                var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                var scrollDy = (midY - trackpadLastTouch.y) * 0.5;
                trackpadLastTouch = { x: 0, y: midY, scroll: true };
                sendJson({ type: 'scroll', dy: -scrollDy });
            }
        }, { passive: false });

        trackpad.addEventListener('touchend', function(e) {
            e.preventDefault();
            trackpadLastTouch = null;
        }, { passive: false });

        // -- Click buttons --
        btnLeft.addEventListener('touchstart', function(e) {
            e.preventDefault();
            sendJson({ type: 'click', button: 'left' });
        }, { passive: false });

        btnRight.addEventListener('touchstart', function(e) {
            e.preventDefault();
            sendJson({ type: 'click', button: 'right' });
        }, { passive: false });

        // -- Mode switching (STT + LLM modes from server) --
        function updateModeLabel() {
            modeLabel.textContent = modes[modeIndex].name;
        }

        modeLeft.addEventListener('click', function() {
            if (isRecording) return;
            modeIndex = (modeIndex - 1 + modes.length) % modes.length;
            currentMode = modes[modeIndex].id;
            updateModeLabel();
        });

        modeRight.addEventListener('click', function() {
            if (isRecording) return;
            modeIndex = (modeIndex + 1) % modes.length;
            currentMode = modes[modeIndex].id;
            updateModeLabel();
        });

        // -- REC button (toggle-to-talk) --
        recBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }, { passive: false });

        // -- Audio capture --
        async function startRecording() {
            if (isRecording) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            if (!audioReady) {
                await initAudioPipeline();
                if (!audioReady) return;
            }

            isRecording = true;
            recBtn.classList.add('recording');
            sendJson({ type: 'rec_start', mode: currentMode });
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            recBtn.classList.remove('recording');
            micLevel.style.width = '0%';
            sendJson({ type: 'rec_stop' });
        }

        function cancelRecording() {
            if (!isRecording) return;
            isRecording = false;
            recBtn.classList.remove('recording');
            micLevel.style.width = '0%';
            sendJson({ type: 'rec_cancel' });
        }

        function cleanupAudio() {
            audioReady = false;
            if (workletNode) {
                workletNode.disconnect();
                workletNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(function(track) { track.stop(); });
                mediaStream = null;
            }
        }

        // -- Helpers --
        function sendJson(obj) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(obj));
            }
        }

        // -- Service Worker --
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function() {
                // SW registration failed, not critical
            });
        }

        // -- Init --
        connectWebSocket();
    })();
    </script>
</body>
</html>
